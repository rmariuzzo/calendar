<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#3069ed">
  <meta name="description" content="A simple calendar view">
  <title>Calendar</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
  <script type="text/javascript">
    // Single Page Apps for GitHub Pages
    // https://github.com/rafrex/spa-github-pages
    (function (l) {
      if (l.search) {
        var q = {}
        l.search.slice(1).split('&').forEach(function (v) {
          var a = v.split('=')
          q[a[0]] = a.slice(1).join('=').replace(/~and~/g, '&')
        })
        if (q.p !== undefined) {
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + (q.p || '') +
            (q.q ? ('?' + q.q) : '') +
            l.hash
          )
        }
      }
    }(window.location))
  </script>
  <script type="module" crossorigin src="/calendar/assets/index-D21dCdyS.js"></script>
  <link rel="stylesheet" crossorigin href="/calendar/assets/index-xPP0UAY5.css">
</head>
<body>
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <div id="root"></div>
</body>
</html>
